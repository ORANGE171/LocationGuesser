<!DOCTYPE html>
<html>
<head>
  <title>Free GeoGuessr</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div id="game">
  <div id="image-container">
    <img id="streetImage" />
  </div>

  <div id="map-container">
    <div id="map"></div>
   <div id="button-row">
  <button id="guessBtn">Submit Guess</button>
  <button id="infoBtn">Didler Info</button>
</div>

<p id="result"></p>

<div id="infoModal" class="modal">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <h2>About Didler</h2>
    <p>
      Didler is a free GeoGuessr-style geography game.
      It uses OpenStreetMap for maps and Mapillary for
      real-world street images.
      Guess locations and test your geography skills!
   
    </p>
  </div>
</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
